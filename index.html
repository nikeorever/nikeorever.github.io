---
title: Posts
layout: default
tab: posts
---

<ul class="posts">
    {% for post in site.categories.post %}
      <li>
        <a id="title" href="{{post.url}}">{{post.title}}</a><br>
        <a id="category">{{post.category}}</a>&nbsp;&nbsp;&nbsp;&nbsp;<a class="date">{{ post.date | date: "%Y-%m-%d" }}</a><br>
      </li>
    {% endfor %}
</ul>
